      function normalizeText(value) {
        return (value || '').toString().toLowerCase().trim();
      }

      function matchesQuery(fields, q) {
        const query = normalizeText(q);
        if (!query) return true;
        return fields.some((f) => normalizeText(f).includes(query));
      }

      function useQueryParam(name) {
        const { search } = useLocation();
        return React.useMemo(() => new URLSearchParams(search).get(name) || '', [search, name]);

      /* ---------- Media helpers (client-side) ---------- */
      function compressImageToDataUrl(file, { maxSize = 256, quality = 0.82 } = {}) {
        return new Promise((resolve, reject) => {
          if (!file) return resolve('');
          if (!file.type || !file.type.startsWith('image/')) {
            return reject(new Error('Please choose a valid image file.'));
          }

          const reader = new FileReader();
          reader.onerror = () => reject(new Error('Failed to read file.'));
          reader.onload = () => {
            const img = new Image();
            img.onerror = () => reject(new Error('Invalid image file.'));
            img.onload = () => {
              const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
              const w = Math.max(1, Math.round(img.width * scale));
              const h = Math.max(1, Math.round(img.height * scale));

              const canvas = document.createElement('canvas');
              canvas.width = w;
              canvas.height = h;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, w, h);

              const dataUrl = canvas.toDataURL('image/jpeg', quality);
              resolve(dataUrl);
            };
            img.src = reader.result;
          };
          reader.readAsDataURL(file);
        });
      }

      /* ---------- Hooks ---------- */
      function useTheme() {
        const [theme, setTheme] = React.useState(() => {
          const stored = localStorage.getItem('iit_theme');
          if (stored === 'light' || stored === 'dark') return stored;
          return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        });

        React.useEffect(() => {
          localStorage.setItem('iit_theme', theme);
          document.body.classList.toggle('light-mode', theme === 'light');
        }, [theme]);

        return {
          theme,
          toggleTheme: () => setTheme((t) => (t === 'dark' ? 'light' : 'dark'))
        };
      }

      function useAuth() {
        const [user, setUser] = React.useState(() => {
          const stored = localStorage.getItem('iit_user');
          return stored ? JSON.parse(stored) : null;
        });

        const login = (data) => {
          localStorage.setItem('iit_token', data.token);
          localStorage.setItem('iit_user', JSON.stringify(data.user));
          setUser(data.user);
        };

        const logout = () => {
          localStorage.removeItem('iit_token');
          localStorage.removeItem('iit_user');
          setUser(null);
        };

        return { user, login, logout };
      }

      function useApi() {
        const token = localStorage.getItem('iit_token');
        const headers = {
          'Content-Type': 'application/json'
        };
        if (token) {
          headers['Authorization'] = 'Bearer ' + token;
        }
        return async (path, options = {}) => {
          const res = await fetch(API_BASE + path, {
            ...options,
            headers: {
              ...headers,
              ...(options.headers || {})
            }
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(data.message || 'Request failed');
          }
          return data;
        };
      }

      function BookingForm({ selectedPackageId }) {
        const api = useApi();
        const [packages, setPackages] = React.useState([]);
        const [hotels, setHotels] = React.useState([]);
        const [vehicles, setVehicles] = React.useState([]);
        const [status, setStatus] = React.useState('');

        const [form, setForm] = React.useState({
          name: '',
          email: '',
          phone: '',
          travelers: 1,
          travelDate: '',
          packageId: selectedPackageId || '',
          notes: '',
          vehicleId: '',
          hotelSelection: [], // Array of { hotelId, roomType }
          startPoint: '',
          endPoint: ''
        });

        const [totalPrice, setTotalPrice] = React.useState(0);
        const [filteredHotels, setFilteredHotels] = React.useState([]);

        React.useEffect(() => {
          if (currentPackage && hotels.length > 0) {
            const related = hotels.filter(h => 
              currentPackage.destinations?.some(d => 
                h.location.toLowerCase().trim().includes(d.toLowerCase().trim()) || 
                d.toLowerCase().trim().includes(h.location.toLowerCase().trim())
              )
            );
            setFilteredHotels(related);
          } else {
            // Hide hotels when no package is selected
            setFilteredHotels([]);
          }
        }, [currentPackage, hotels]);

        React.useEffect(() => {
          if (selectedPackageId) {
            setForm(f => ({ ...f, packageId: selectedPackageId }));
          }
        }, [selectedPackageId]);

        React.useEffect(() => {
          const fetchData = async () => {
            try {
              const [pkgs, htls, vhcls] = await Promise.all([
                api('/packages'),
                api('/hotels'),
                api('/vehicles')
              ]);
              setPackages(pkgs);
              setHotels(htls);
              setVehicles(vhcls);
            } catch (err) {
              console.error('Error fetching data:', err);
            }
          };
          fetchData();
        }, []);

        const currentPackage = React.useMemo(() => 
          packages.find(p => p._id === form.packageId), 
          [packages, form.packageId]
        );

        React.useEffect(() => {
          if (!currentPackage) {
            setTotalPrice(0);
            return;
          }

          let price = currentPackage.price;

          const sp = currentPackage.startPoints?.find(p => p.location === form.startPoint);
          if (sp) price += sp.additionalCost;

          const ep = currentPackage.endPoints?.find(p => p.location === form.endPoint);
          if (ep) price += ep.additionalCost;

          const v = vehicles.find(v => v._id === form.vehicleId);
          if (v) price += v.basePrice;

          form.hotelSelection.forEach(sel => {
            const h = hotels.find(h => h._id === sel.hotelId);
            if (h) {
              price += h.pricePerNight;
              const rt = h.roomTypes?.find(r => r.name === sel.roomType);
              if (rt) price += rt.additionalCost;
            }
          });

          setTotalPrice(price * form.travelers);
        }, [form, currentPackage, hotels, vehicles]);

        const handleChange = (e) => {
          const { name, value } = e.target;
          setForm((f) => ({ ...f, [name]: value }));
        };

        const handleHotelRoomSelect = (hotelId, roomType) => {
          setForm(f => {
            const exists = f.hotelSelection.find(s => s.hotelId === hotelId);
            let nextSelection;
            if (exists) {
              if (exists.roomType === roomType) {
                nextSelection = f.hotelSelection.filter(s => s.hotelId !== hotelId);
              } else {
                nextSelection = f.hotelSelection.map(s => s.hotelId === hotelId ? { hotelId, roomType } : s);
              }
            } else {
              nextSelection = [...f.hotelSelection, { hotelId, roomType }];
            }
            return { ...f, hotelSelection: nextSelection };
          });
        };

        const handleSubmit = async (e) => {
          e.preventDefault();
          setStatus('Submitting...');
          try {
            await api('/bookings', {
              method: 'POST',
              body: JSON.stringify(form)
            });
            setStatus('Booking request submitted successfully!');
            setForm({
              name: '', email: '', phone: '', travelers: 1, travelDate: '',
              packageId: '', notes: '', vehicleId: '', hotelSelection: [],
              startPoint: '', endPoint: ''
            });
          } catch (err) {
            setStatus(err.message || 'Failed to submit booking.');
          }
        };

        return (
          <section className="py-10 sm:py-12 bg-slate-950">
            <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">

                      <label className="block text-xs font-medium text-slate-200 mb-1">End Point</label>
                      <select name="endPoint" required value={form.endPoint} onChange={handleChange}
                        className="w-full rounded-xl bg-slate-950/70 border-slate-700 text-sm text-slate-100">
                        <option value="">Select End Point</option>
                        {currentPackage.endPoints?.map(p => (
                          <option key={p.location} value={p.location}>{p.location} (+₹{p.additionalCost})</option>

                      <option value="">No Vehicle (Self Arrange)</option>

                    <p className="text-xs text-slate-400 uppercase tracking-wider font-semibold">Total Price</p>

                    Confirm Booking
                  </button>
                </div>
                {status && <p className="text-xs text-center text-slate-300 mt-2">{status}</p>}
              </form>
            </div>
          </section>
        );
      }

      function Packages() {
        const api = useApi();

        const [search, setSearch] = React.useState('');
        const [maxPrice, setMaxPrice] = React.useState(50000);
        const [duration, setDuration] = React.useState('');
        const [bookingPkgId, setBookingPkgId] = React.useState('');

        React.useEffect(() => {
          (async () => {
            try {
              const data = await api('/packages');
              setPackages(data);
              setFilteredPackages(data);
            } catch (err) {
              console.error(err);
            }
          })();
        }, []);

        React.useEffect(() => {
          let filtered = packages.filter(p => 
            (p.title.toLowerCase().includes(search.toLowerCase()) || 
             p.destinations?.some(d => d.toLowerCase().includes(search.toLowerCase()))) &&
            p.price <= maxPrice
          );
          
          if (duration) {
            filtered = filtered.filter(p => p.duration.includes(duration));
          }

          setFilteredPackages(filtered);
        }, [search, maxPrice, duration, packages]);

        return (
          <>
            <section className="py-8 sm:py-10 bg-slate-950 border-b border-slate-800">
              <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                <h1 className="text-2xl sm:text-3xl font-semibold text-white mb-2">Curated tour packages</h1>
                <p className="text-sm text-slate-300 max-w-2xl">
                  Explore India with ready-to-go itineraries that balance must-see landmarks and authentic local
                  experiences.
                </p>
              </div>
            </section>

            <section className="py-6 bg-slate-900/50 border-b border-slate-800 sticky top-16 z-20 backdrop-blur">
              <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-wrap gap-4 items-center justify-between">
                <div className="relative flex-1 min-w-[200px]">
                  <span className="absolute inset-y-0 left-3 flex items-center text-slate-400">⌕</span>
                  <input 
                    type="text" 
                    placeholder="Search by name or destination..." 
                    className="w-full pl-9 rounded-xl bg-slate-950 border-slate-700 text-sm"
                    value={search}
                    onChange={(e) => setSearch(e.target.value)}
                  />
                </div>
                <div className="flex flex-wrap gap-4">
                  <div className="flex flex-col">
                    <label className="text-[10px] text-slate-400 font-semibold mb-1 uppercase">Max Price: ₹{maxPrice}</label>
                    <input 
                      type="range" min="5000" max="50000" step="1000"
                      value={maxPrice} onChange={(e) => setMaxPrice(e.target.value)}
                      className="w-32 accent-accent-500"
                    />
                  </div>
                  <select 
                    className="rounded-xl bg-slate-950 border-slate-700 text-sm"
                    value={duration} onChange={(e) => setDuration(e.target.value)}
                  >
                    <option value="">All Durations</option>
                    <option value="4 Days">4-5 Days</option>
                    <option value="6 Days">6-7 Days</option>
                  </select>
                </div>
              </div>
            </section>

            <section className="py-8 sm:py-10 bg-slate-950">
              <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
                  {filteredPackages.map((pkg) => (
                    <article
                      key={pkg._id}
                      className="group rounded-2xl border border-slate-800 bg-slate-950/60 shadow-lg hover:border-accent-500/50 transition-all flex flex-col"
                    >
                      <div className="relative h-48 overflow-hidden rounded-t-2xl">
                        <img src={pkg.imageUrl} alt={pkg.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform" />
                        <div className="absolute top-3 right-3 bg-slate-950/80 px-2 py-1 rounded-lg text-xs font-bold text-accent-500 border border-slate-700">
                          ₹{pkg.price.toLocaleString('en-IN')}
                        </div>
                      </div>
                      <div className="p-5 flex flex-col flex-1">
                        <div className="flex justify-between items-start mb-2">
                          <h2 className="text-sm font-bold text-white leading-tight">{pkg.title}</h2>
                          <span className="text-[10px] text-amber-400 whitespace-nowrap">★ {pkg.rating?.toFixed(1) || '4.5'}</span>
                        </div>
                        <p className="text-xs text-slate-400 mb-3 line-clamp-2">{pkg.description}</p>
                        <div className="flex items-center gap-2 mb-4">
                          <span className="text-[10px] bg-slate-800 text-slate-300 px-2 py-1 rounded-md">{pkg.duration}</span>
                          <span className="text-[10px] bg-primary-600/20 text-primary-400 px-2 py-1 rounded-md">{pkg.destinations?.[0]}</span>
                        </div>
                        <ul className="flex flex-wrap gap-1 mb-5">

                            <li key={f} className="text-[9px] text-slate-500 border border-slate-800 px-2 py-0.5 rounded-full">{f}</li>
                          ))}

                        <div className="mt-auto">
                          <button

                              setBookingPkgId(pkg._id);
                              document.getElementById('booking-section').scrollIntoView({ behavior: 'smooth' });

          </>

      function Stories() {
        const api = useApi();
        const [stories, setStories] = React.useState([]);
        const [title, setTitle] = React.useState('');
        const [text, setText] = React.useState('');
        const [mediaUrlInput, setMediaUrlInput] = React.useState('');
        const [status, setStatus] = React.useState('');
        const [expandedComments, setExpandedComments] = React.useState(() => new Set());
        const [commentDrafts, setCommentDrafts] = React.useState({});
        const [commentStatusById, setCommentStatusById] = React.useState({});
        const token = localStorage.getItem('iit_token');

        React.useEffect(() => {
          (async () => {
            try {
              const data = await api('/stories');
              setStories(data);
            } catch {
              // ignore for public view
            }
          })();
        }, []);

        const handlePost = async (e) => {
          e.preventDefault();
          setStatus('Posting your story...');
          try {
            const mediaUrls = mediaUrlInput
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean);
            const created = await api('/stories', {
              method: 'POST',
              body: JSON.stringify({ title, text, mediaUrls })
            });
            setStories((list) => [created, ...list]);
            setTitle('');
            setText('');
            setMediaUrlInput('');
            setStatus('Story posted!');
          } catch (err) {
            setStatus(err.message || 'Failed to post story.');
          }
        };

        const toggleLike = async (id) => {
          try {
            const updated = await api(`/stories/${id}/like`, { method: 'POST' });
            setStories((list) => list.map((s) => (s._id === id ? updated : s)));
          } catch {
            alert('Login to like stories.');
          }
        };

        const toggleComments = (id) => {
          setExpandedComments((prev) => {
            const next = new Set(prev);
            if (next.has(id)) next.delete(id);
            else next.add(id);
            return next;
          });
        };

        const submitComment = async (storyId) => {
          const text = (commentDrafts[storyId] || '').trim();
          if (!text) return;

          setCommentStatusById((m) => ({ ...m, [storyId]: 'Posting...' }));
          try {
            const updated = await api(`/stories/${storyId}/comments`, {
              method: 'POST',
              body: JSON.stringify({ text })
            });
            setStories((list) => list.map((s) => (s._id === storyId ? updated : s)));
            setCommentDrafts((d) => ({ ...d, [storyId]: '' }));
            setCommentStatusById((m) => ({ ...m, [storyId]: 'Posted' }));
            setExpandedComments((prev) => new Set(prev).add(storyId));
          } catch (err) {
            setCommentStatusById((m) => ({ ...m, [storyId]: err.message || 'Failed to post comment.' }));
          }
        };

        return (
          <>
            <section className="py-8 sm:py-10 bg-slate-950 border-b border-slate-800">
              <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                <h1 className="text-2xl sm:text-3xl font-semibold text-white mb-2">Read travel stories</h1>
                <p className="text-sm text-slate-300 max-w-2xl">
                  Real experiences, tips, and memories from travellers who explored Incredible India. Share your own
                  story with the community.
                </p>
              </div>
            </section>
            <section className="py-8 sm:py-10 bg-slate-950">
              <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 grid gap-6 lg:grid-cols-3">
                <div className="lg:col-span-1">
                  <div className="rounded-2xl border border-slate-800 bg-slate-950/60 p-4">
                    <h2 className="text-sm font-semibold text-white mb-1">Post a travel story</h2>
                    <p className="text-xs text-slate-300 mb-3">
                      Login to share your favourite memories, photos, and tips with other travellers.
                    </p>
                    {token ? (
                      <form onSubmit={handlePost} className="space-y-2">
                        <div>
                          <label className="block text-xs font-medium text-slate-200 mb-1" htmlFor="story-title">
                            Title
                          </label>
                          <input
                            id="story-title"
                            required
                            value={title}
                            onChange={(e) => setTitle(e.target.value)}
                            className="w-full rounded-xl bg-slate-950/70 border-slate-700 text-sm text-slate-100 placeholder:text-slate-500"
                          />
                        </div>
                        <div>
                          <label className="block text-xs font-medium text-slate-200 mb-1" htmlFor="story-text">
                            Story
                          </label>
                          <textarea
                            id="story-text"
                            required
                            rows="4"
                            value={text}
                            onChange={(e) => setText(e.target.value)}
                            placeholder="Share your itinerary, favourite spots, and what made the trip special..."
                            className="w-full rounded-xl bg-slate-950/70 border-slate-700 text-sm text-slate-100 placeholder:text-slate-500"
                          ></textarea>
                        </div>
                        <div>
                          <label className="block text-xs font-medium text-slate-200 mb-1" htmlFor="story-media">
                            Photo / video URLs (comma separated)
                          </label>
                          <input
                            id="story-media"
                            value={mediaUrlInput}
                            onChange={(e) => setMediaUrlInput(e.target.value)}
                            placeholder="https://... , https://..."
                            className="w-full rounded-xl bg-slate-950/70 border-slate-700 text-sm text-slate-100 placeholder:text-slate-500"
                          />
                          <p className="mt-1 text-[11px] text-slate-400">
                            For this demo, upload media to your preferred host and paste the links here.
                          </p>
                        </div>
                        <button
                          type="submit"
                          className="inline-flex justify-center items-center rounded-xl bg-primary-600 text-slate-50 text-sm font-semibold px-4 py-2.5 hover:bg-primary-700 transition"
                        >
                          Publish story
                        </button>
                        {status && <p className="text-[11px] text-slate-300">{status}</p>}
                      </form>
                    ) : (
                      <p className="text-xs text-slate-300">
                        Please <Link className="text-accent-500 underline" to="/login">login</Link> to post your own
                        travel story.
                      </p>
                    )}
                  </div>
                </div>
                <div className="lg:col-span-2">
                  <div className="space-y-4">
                    {stories.length === 0 && (
                      <p className="text-xs text-slate-300">
                        Stories from the community will appear here once travellers start sharing their journeys.
                      </p>
                    )}
                    {stories.map((story) => (
                      <article
                        key={story._id}
                        className="rounded-2xl border border-slate-800 bg-slate-950/60 p-4 shadow-lg shadow-slate-950/50"
                      >
                        <div className="flex items-center gap-3 mb-3">
                          <div className="h-8 w-8 rounded-full bg-slate-800 flex items-center justify-center text-xs font-semibold text-slate-100 overflow-hidden">
                            {story.userId?.profilePhotoUrl ? (
                              <img
                                src={story.userId.profilePhotoUrl}
                                alt={story.userId.name}
                                className="h-full w-full object-cover"
                                loading="lazy"
                              />
                            ) : (
                              <span>{story.userId?.name?.charAt(0) || 'T'}</span>
                            )}
                          </div>
                          <div>
                            <p className="text-xs font-semibold text-slate-100">{story.userId?.name || 'Traveller'}</p>
                            <p className="text-[11px] text-slate-400">
                              {new Date(story.createdAt).toLocaleDateString('en-IN', {
                                day: '2-digit',
                                month: 'short',
                                year: 'numeric'
                              })}
                            </p>
                          </div>
                        </div>
                        <h2 className="text-sm font-semibold text-white mb-2">{story.title}</h2>
                        <p className="text-xs text-slate-200 whitespace-pre-line mb-3">{story.text}</p>
                        {story.mediaUrls && story.mediaUrls.length > 0 && (
                          <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 mb-3">
                            {story.mediaUrls.slice(0, 6).map((url, idx) => (
                              <div key={idx} className="aspect-video rounded-xl overflow-hidden bg-slate-900">
                                {url.match(/\.(mp4|webm)$/i) ? (
                                  <video src={url} controls className="h-full w-full object-cover" />
                                ) : (
                                  <img
                                    src={url}
                                    alt={story.title}
                                    className="h-full w-full object-cover"
                                    loading="lazy"
                                  />
                                )}
                              </div>
                            ))}
                          </div>
                        )}
                        <div className="flex flex-wrap items-center gap-3 text-[11px] text-slate-300">
                          <button
                            onClick={() => (token ? toggleLike(story._id) : alert('Login to like stories.'))}
                            className="inline-flex items-center gap-2 rounded-full border border-slate-700 px-3 py-1.5 text-accent-500 hover:text-accent-400 hover:border-accent-500 transition"
                          >
                            <span>♥</span>
                            <span>{story.likes?.length || 0}</span>
                            <span className="text-slate-400">Likes</span>
                          </button>
                          <button
                            onClick={() => toggleComments(story._id)}
                            className="inline-flex items-center gap-2 rounded-full border border-slate-700 px-3 py-1.5 text-slate-200 hover:text-white hover:border-slate-500 transition"
                          >
                            <span>💬</span>
                            <span>{story.comments?.length || 0}</span>
                            <span className="text-slate-400">Comments</span>
                          </button>
                          {!token && (
                            <span className="text-slate-400">
                              Login to like or comment.
                            </span>
                          )}
                        </div>

                        {expandedComments.has(story._id) && (
                          <div className="mt-4 rounded-2xl border border-slate-800 bg-slate-950/40 p-3">
                            <h3 className="text-xs font-semibold text-slate-100 mb-2">Comments</h3>

                            {token && (
                              <div className="mb-3">
                                <div className="flex flex-col sm:flex-row gap-2">
                                  <input
                                    value={commentDrafts[story._id] || ''}
                                    onChange={(e) =>
                                      setCommentDrafts((d) => ({ ...d, [story._id]: e.target.value }))
                                    }
                                    placeholder="Write a comment..."
                                    className="w-full rounded-xl bg-slate-950/70 border-slate-700 text-sm text-slate-100 placeholder:text-slate-500"
                                  />
                                  <button
                                    onClick={() => submitComment(story._id)}
                                    className="inline-flex justify-center items-center rounded-xl bg-primary-600 text-slate-50 text-sm font-semibold px-4 py-2.5 hover:bg-primary-700 transition whitespace-nowrap"
                                  >
                                    Post
                                  </button>
                                </div>
                                {commentStatusById[story._id] && (
                                  <p className="mt-1 text-[11px] text-slate-400">{commentStatusById[story._id]}</p>
                                )}
                              </div>
                            )}

                            <div className="space-y-2">
                              {(story.comments || []).length === 0 ? (
                                <p className="text-[11px] text-slate-400">No comments yet. Be the first!</p>
                              ) : (
                                (story.comments || []).slice().reverse().map((c) => (
                                  <div key={c._id || c.createdAt} className="flex gap-2">
                                    <div className="h-7 w-7 rounded-full bg-slate-800 flex items-center justify-center text-[11px] font-semibold text-slate-100 overflow-hidden">
                                      {c.userId?.profilePhotoUrl ? (
                                        <img
                                          src={c.userId.profilePhotoUrl}
                                          alt={c.userId.name}
                                          className="h-full w-full object-cover"
                                          loading="lazy"
                                        />
                                      ) : (
                                        <span>{c.userId?.name?.charAt(0) || 'U'}</span>
                                      )}
                                    </div>
                                    <div className="flex-1 min-w-0">
                                      <div className="flex items-center justify-between gap-2">
                                        <p className="text-[11px] font-semibold text-slate-100 truncate">
                                          {c.userId?.name || 'User'}

                          <p className="text-slate-400">{b.travelers} travellers</p>
                        </div>
                      </div>
                      {b.notes && <p className="mt-2 text-slate-300">Notes: {b.notes}</p>}
                    </article>
                  ))}
                </div>
              )}

              {tab === 'stories' && (
                <div className="space-y-3">
                  {myStories.length === 0 && (
                    <p className="text-xs text-slate-300">
                      You haven&apos;t shared any stories yet. Post your first one on the Travel Stories page.
                    </p>
                  )}
                  {myStories.map((story) => (
                    <article
                      key={story._id}
                      className="rounded-2xl border border-slate-800 bg-slate-950/60 p-4 text-xs text-slate-200"
                    >
                      <div className="flex items-center justify-between gap-2 mb-1">
                        <h2 className="font-semibold text-slate-100">{story.title}</h2>
                        <p className="text-[11px] text-slate-400">
                          {new Date(story.createdAt).toLocaleDateString('en-IN', {
                            day: '2-digit',
                            month: 'short',
                            year: 'numeric'
                          })}
                        </p>
                      </div>
                      <p className="text-slate-300 mb-2 line-clamp-3">{story.text}</p>
                      <div className="flex items-center justify-between text-[11px] text-slate-400">
                        <span>
                          {story.likes?.length || 0} likes · {story.comments?.length || 0} comments
                        </span>
                        <button
                          onClick={() => removeStory(story._id)}
                          className="inline-flex items-center text-rose-400 hover:text-rose-300"
                        >
                          Delete
                        </button>
                      </div>
                    </article>
                  ))}
                </div>
              )}
            </div>
          </section>
        );
      }

      /* ---------- Shared footer ---------- */
      function Footer() {
        return (
          <footer className="border-t border-slate-800 bg-slate-950">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col sm:flex-row gap-4 sm:items-center sm:justify-between text-[11px] text-slate-400">
              <div>
                <p className="font-semibold text-slate-200">Start2Go</p>
                <p className="mt-0.5">
                  Crafted as a modern demo for exploring, booking, and sharing travel experiences across India.
                </p>
              </div>
              <div className="flex flex-col sm:items-end gap-2">
                <div className="flex gap-3">
                  <a
                    href="https://www.facebook.com"
                    target="_blank"
                    rel="noopener"
                    className="hover:text-slate-200"
                    aria-label="Facebook"
                  >
                    Facebook
                  </a>
                  <a
                    href="https://www.instagram.com"
                    target="_blank"
                    rel="noopener"
                    className="hover:text-slate-200"
                    aria-label="Instagram"
                  >
                    Instagram
                  </a>
                  <a
                    href="https://www.youtube.com"
                    target="_blank"
                    rel="noopener"
                    className="hover:text-slate-200"
                    aria-label="YouTube"
                  >
                    YouTube
                  </a>
                </div>
                <p>© {new Date().getFullYear()} Start2Go. All rights reserved.</p>
              </div>
            </div>
          </footer>
        );
      }

      /* ---------- App entry ---------- */
      function App() {
        const auth = useAuth();

        return (
          <BrowserRouter>
            <Layout auth={auth} />
          </BrowserRouter>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
